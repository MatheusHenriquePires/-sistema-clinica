<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand-block">
        <p class="brand-kicker">Sistema da Clínica</p>
        <h2>ClinicSys</h2>
        <p class="brand-copy">Gestão de pacientes, médicos e consultas.</p>
      </div>

      <div class="sidebar-section-title">Menu principal</div>
    </div>

    <nav class="nav-list">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          class="nav-link"
        >
          <span class="nav-link-title">{{ item.label }}</span>
          <small>{{ item.caption }}</small>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <button class="btn btn-secondary sidebar-btn" type="button" (click)="logout()">
        Sair do sistema
      </button>
    </div>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
